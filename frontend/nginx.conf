server {
  listen 80;

  # Sert l'application React. try_files renvoie index.html pour gérer
  # les routes côté client (React Router).
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }

  # Redirige les appels /api vers le conteneur backend (même origine).
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
