name: CD

# Déploiement : se déclenche quand du code arrive sur main (après une CI verte).
#
# Le déploiement EXÉCUTÉ est géré par les plateformes connectées à GitHub :
#   - Backend  -> Railway (build du Dockerfile backend, + MySQL + MongoDB)
#   - Frontend -> Vercel (build du projet Vite)
# Elles se redéploient automatiquement à chaque push sur main.
#
# Ce workflow, en plus, construit et publie les images Docker sur le GitHub
# Container Registry (GHCR) : c'est la preuve de conteneurisation et de
# publication dans un registre (compétence C11), avec un tag SHA pour le suivi.
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/abdulmvlick/noru-backend:latest
            ghcr.io/abdulmvlick/noru-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/abdulmvlick/noru-frontend:latest
            ghcr.io/abdulmvlick/noru-frontend:${{ github.sha }}
