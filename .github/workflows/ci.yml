name: CI

# Se déclenche à chaque push et chaque pull request.
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ---- Backend : lint + migrations + tests d'intégration ----
  backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: noru_root_pwd
          MYSQL_DATABASE: noru
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -uroot -pnoru_root_pwd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "mysql://root:noru_root_pwd@127.0.0.1:3306/noru"
      MONGODB_URI: "mongodb://127.0.0.1:27017/noru"
      JWT_SECRET: "secret_de_ci"
      JWT_EXPIRES_IN: "1d"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Appliquer les migrations
        run: npx prisma migrate deploy
      - name: Lint
        run: npm run lint
      - name: Tests d'intégration
        run: npm run test:e2e

  # ---- Frontend : lint + build ----
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
